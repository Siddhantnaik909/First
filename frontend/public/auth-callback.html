<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>SMART HUB | Authenticating...</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .material-symbols-outlined { font-family: 'Material Symbols Outlined';  font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
    </style>
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen text-gray-900 antialiased">

        <!-- Unified Navbar Component Placeholder -->
    <div id="header-placeholder"></div>

<main class="w-full max-w-md bg-white p-10 rounded-2xl shadow-lg border border-gray-100 text-center flex flex-col items-center main-with-navbar">
        <div class="mb-6 flex justify-center w-12 h-12 rounded-xl bg-indigo-600 items-center animate-spin">
            <span class="material-symbols-outlined text-white">sync</span>
        </div>
        <h2 class="text-2xl font-bold tracking-tight text-gray-900 mb-2">Authenticating...</h2>
        <p class="text-gray-500 font-medium">Please wait while we finalize your login.</p>
        <div id="error-msg" class="hidden mt-6 w-full p-4 bg-red-50 border border-red-100 text-red-600 rounded-lg text-sm font-semibold"></div>
    </main>

    <script>
        (async function() {
            const errorMsg = document.getElementById('error-msg');
            const API_URL = (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1' || window.location.protocol === 'file:')
                    ? 'http://localhost:3000'
                    : 'https://smart-hub-f5gw.onrender.com';

            try {
                const params = new URLSearchParams(window.location.search);
                const token = params.get('token');

                if (!token) throw new Error('Authentication token not found.');

                localStorage.setItem('token', token);

                const res = await fetch(`${API_URL}/api/auth/me`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (!res.ok) throw new Error('Could not retrieve profile.');

                const user = await res.json();
                localStorage.setItem('user', JSON.stringify(user));
                localStorage.setItem('isLoggedIn', 'true');

                // REDIRECT TO ROOT
                window.location.href = '/index.html';

            } catch (err) {
                errorMsg.innerText = err.message;
                errorMsg.classList.remove('hidden');
                setTimeout(() => { window.location.href = '/login.html'; }, 3000);
            }
        })();
    </script>
<script type="module" src="/js/script.js"></script>

    






    <!-- Unified Footer -->
    <footer class="w-full py-12 sm:py-16 border-t border-surface-container-high bg-surface-container-low dark:border-[#1e293b]/50 dark:bg-[#0f172a] font-['Plus_Jakarta_Sans'] text-on-surface">
        <div class="max-w-[1440px] mx-auto px-4 sm:px-6 lg:px-10 flex flex-col gap-8 lg:flex-row justify-between lg:items-center">
            <div>
                <span class="text-xl font-black tracking-tighter text-[#1f2937] dark:text-white">SMART HUB</span>
                <p class="text-[10px] font-bold text-slate-500 dark:text-[#94a3b8] uppercase tracking-[0.3em] mt-2">© 2026 Simplifying your student life</p>
            </div>
            <div class="flex flex-wrap gap-6 sm:gap-12 text-[9px] font-black text-slate-500 dark:text-[#94a3b8] uppercase tracking-[0.3em]">
                <a class="hover:text-primary transition-colors dark:hover:text-primary" href="/about.html">About</a>
                <a class="hover:text-primary transition-colors dark:hover:text-primary" href="/contact.html">Contact</a>
                <a class="hover:text-primary transition-colors dark:hover:text-primary" href="/history.html">History</a>
                <a class="hover:text-primary transition-colors dark:hover:text-primary" href="/settings.html">Settings</a>
            </div>
        </div>
    </footer>

    <div id="footer-placeholder"></div>
    <script src="/js/component-loader.js"></script>

</body>
</html>
