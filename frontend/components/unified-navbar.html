<script>
// ==========================================
// Admin UI Config Integration
// ==========================================

function applyAdminConfig() {
    if (!window.AdminUIConfig) return;
    
    const config = window.AdminUIConfig.getConfig();
    const features = window.AdminUIConfig.getFeatures();
    
    // Apply navbar visibility (controlled by admin)
    if (!config.navbar) {
        document.querySelector('nav')?.classList.add('hidden');
        return;
    }
    document.querySelector('nav')?.classList.remove('hidden');
    
    // Apply auth visibility based on features
    if (!features.auth) {
        document.getElementById('auth-section')?.classList.add('hidden');
    }
    
    // Apply animations
    if (!config.animations) {
        document.body?.classList.add('no-animations');
    }
    
    // Apply theme from admin config
    if (config.theme === 'dark') {
        document.documentElement.classList.remove('light');
        document.documentElement.classList.add('dark');
    } else if (config.theme === 'light') {
        document.documentElement.classList.remove('dark');
        document.documentElement.classList.add('light');
    }
    
    // Apply layout density
    if (config.layoutDensity) {
        document.body?.classList.remove('layout-compact', 'layout-normal', 'layout-spacious');
        document.body?.classList.add(`layout-${config.layoutDensity}`);
    }
}

function toggleDarkMode() {
    const html = document.documentElement;
    const isDark = html.classList.contains('dark');
    
    // Update admin config
    if (window.AdminUIConfig) {
        window.AdminUIConfig.updateConfig({
            theme: isDark ? 'light' : 'dark'
        });
    } else {
        // Fallback to manual toggle
        if (isDark) {
            html.classList.remove('dark');
            html.classList.add('light');
            localStorage.setItem('theme', 'light');
        } else {
            html.classList.remove('light');
            html.classList.add('dark');
            localStorage.setItem('theme', 'dark');
        }
    }
}

// ==========================================
// Authentication & Role-Based Navbar
// ==========================================

// Auth State Management with safe fallback
function getAuthState() {
    const user = localStorage.getItem('user');
    const token = localStorage.getItem('token');
    const isLoggedIn = localStorage.getItem('isLoggedIn') === 'true';
    
    if (!user || !token || !isLoggedIn) {
        return { isLoggedIn: false, user: null };
    }
    
    try {
        const userData = JSON.parse(user);
        // Ensure user data has required fields with safe fallback
        return { 
            isLoggedIn: true, 
            user: {
                name: userData?.name || userData?.username || 'Guest User',
                email: userData?.email || '',
                role: userData?.role || 'user',
                ...userData
            }
        };
    } catch (e) {
        return { isLoggedIn: false, user: null };
    }
}

// Update navbar UI based on auth state
function updateNavbarAuthUI() {
    const { isLoggedIn, user } = getAuthState();
    const authGuest = document.getElementById('auth-guest');
    const authUser = document.getElementById('auth-user');
    const mobileAuthGuest = document.getElementById('mobile-auth-guest');
    const mobileAuthUser = document.getElementById('mobile-auth-user');
    
    if (isLoggedIn && user) {
        // Logged in - Show profile dropdown
        const name = user.name || 'Guest User';
        const initials = name.split(' ').map(n => n[0]).join('').toUpperCase().slice(0, 2) || 'G';
        const role = user.role || 'user';
        
        // Desktop UI
        if (authGuest) {
            authGuest.classList.add('hidden');
            authGuest.classList.remove('flex');
        }
        if (authUser) {
            authUser.classList.remove('hidden');
            authUser.classList.add('flex');
        }
        
        // Update profile info
        const profileName = document.getElementById('profile-name');
        const profileAvatar = document.getElementById('profile-avatar');
        const dropdownName = document.getElementById('dropdown-name');
        const dropdownRole = document.getElementById('dropdown-role');
        const adminLink = document.getElementById('admin-link');
        
        if (profileName) profileName.textContent = name;
        if (profileAvatar) profileAvatar.textContent = initials;
        if (dropdownName) dropdownName.textContent = name;
        if (dropdownRole) dropdownRole.textContent = role;
        
        // Show admin link and badge only for admin role
        if (adminLink) {
            if (role === 'admin') {
                adminLink.classList.remove('hidden');
            } else {
                adminLink.classList.add('hidden');
            }
        }
        
        // Mobile UI
        if (mobileAuthGuest) {
            mobileAuthGuest.classList.add('hidden');
            mobileAuthGuest.classList.remove('flex');
        }
        if (mobileAuthUser) {
            mobileAuthUser.classList.remove('hidden');
            mobileAuthUser.classList.add('flex');
            mobileAuthUser.classList.remove('flex-col');
            mobileAuthUser.classList.add('flex');
        }
        
        const mobileProfileName = document.getElementById('mobile-profile-name');
        const mobileProfileAvatar = document.getElementById('mobile-profile-avatar');
        const mobileProfileRole = document.getElementById('mobile-profile-role');
        const mobileAdminLink = document.getElementById('mobile-admin-link');
        
        if (mobileProfileName) mobileProfileName.textContent = name;
        if (mobileProfileAvatar) mobileProfileAvatar.textContent = initials;
        if (mobileProfileRole) mobileProfileRole.textContent = role;
        
        if (mobileAdminLink) {
            if (role === 'admin') {
                mobileAdminLink.classList.remove('hidden');
            } else {
                mobileAdminLink.classList.add('hidden');
            }
        }
        
    } else {
        // Not logged in - Show Login/Sign Up buttons
        if (authGuest) {
            authGuest.classList.remove('hidden');
            authGuest.classList.add('flex');
        }
        if (authUser) {
            authUser.classList.add('hidden');
            authUser.classList.remove('flex');
        }
        
        if (mobileAuthGuest) {
            mobileAuthGuest.classList.remove('hidden');
            mobileAuthGuest.classList.add('flex');
        }
        if (mobileAuthUser) {
            mobileAuthUser.classList.add('hidden');
            mobileAuthUser.classList.remove('flex');
        }
    }
}

// Initialize Auth UI (alias for compatibility)
function initAuthUI() {
    updateNavbarAuthUI();
}

// Profile Dropdown Toggle
function toggleProfileDropdown() {
    const dropdown = document.getElementById('profile-dropdown');
    if (dropdown) {
        dropdown.classList.toggle('hidden');
    }
}

// Close dropdown when clicking outside
function closeDropdownOnClickOutside(event) {
    const dropdown = document.getElementById('profile-dropdown');
    const btn = document.getElementById('profile-dropdown-btn');
    
    if (dropdown && !dropdown.classList.contains('hidden') && 
        btn && !btn.contains(event.target) && !dropdown.contains(event.target)) {
        dropdown.classList.add('hidden');
    }
}

// Listen for auth state changes across tabs
window.addEventListener('storage', (e) => {
    if (e.key === 'isLoggedIn' || e.key === 'user' || e.key === 'token') {
        updateNavbarAuthUI();
    }
});

// Listen for custom auth state change events
window.addEventListener('authStateChanged', () => {
    updateNavbarAuthUI();
});

// Logout Function
function logout() {
    // Use authSystem if available for cleanup
    if (window.authSystem && typeof window.authSystem.logout === 'function') {
        window.authSystem.logout();
    } else {
        // Manual cleanup
        localStorage.removeItem('token');
        localStorage.removeItem('user');
        localStorage.removeItem('isLoggedIn');
    }
    
    // Dispatch event for instant UI update
    window.dispatchEvent(new Event('authStateChanged'));
    
    // Close dropdown first
    const dropdown = document.getElementById('profile-dropdown');
    if (dropdown) dropdown.classList.add('hidden');
    
    // Redirect to login page
    window.location.href = '/login.html';
}

// Mobile menu toggle
function toggleMobileMenu() {
    const menu = document.getElementById('mobile-menu');
    if (menu) {
        menu.classList.toggle('hidden');
        document.body.style.overflow = menu.classList.contains('hidden') ? '' : 'hidden';
    }
}

// Initialize everything
(function() {
    // Initialize theme from admin config first
    applyAdminConfig();
    
    // Fallback: Initialize theme from localStorage if admin config not loaded
    if (!window.AdminUIConfig) {
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme === 'dark') {
            document.documentElement.classList.remove('light');
            document.documentElement.classList.add('dark');
        }
    }
    
    // Initialize auth UI (no flicker - starts hidden, then shows)
    initAuthUI();
    
    // Add click listener for dropdown close on outside click
    document.addEventListener('click', closeDropdownOnClickOutside);
    
    // Also initialize auth system if not already loaded
    if (window.authSystem && !window.authSystem.isLoggedIn) {
        // Force auth system to reload session
        window.authSystem.loadSession();
    }
    
    // Listen for admin config changes
    window.addEventListener('adminUIConfigChanged', () => {
        applyAdminConfig();
        updateNavbarAuthUI();
    });
    
    // Listen for feature changes
    window.addEventListener('featureTogglesChanged', () => {
        const features = window.AdminUIConfig?.getFeatures() || window.FeatureToggles?.FEATURES;
        if (features) {
            applyAdminConfig();
            updateNavbarAuthUI();
        }
    });
    
    // Ensure auth UI runs on component load
    window.addEventListener('componentLoaded', () => {
        if (typeof updateNavbarAuthUI === 'function') {
            updateNavbarAuthUI();
        }
    });
})();

// Expose functions to window
window.logout = logout;
window.toggleProfileDropdown = toggleProfileDropdown;
window.updateNavbarAuthUI = updateNavbarAuthUI;
window.getAuthState = getAuthState;

// Add click-outside listener for dropdown
document.addEventListener('click', closeDropdownOnClickOutside);
</script>
